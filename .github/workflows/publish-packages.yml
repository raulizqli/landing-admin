name: Publish packages to GitHub Packages

on:
  workflow_dispatch:
  push:
    tags:
      - 'packages-v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: https://npm.pkg.github.com
          scope: '@raulizqli'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Publish @raulizqli/landing-core
        run: npm publish -w packages/landing-core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish @raulizqli/landing-ui
        run: npm publish -w packages/landing-ui
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
